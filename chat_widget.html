<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mailchimp Style Guide Assistant</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 1rem;
    }

    /* ── Widget shell ─────────────────────────────────────────────────────── */
    #chat-widget {
      width: 100%;
      max-width: 680px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 620px;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    #chat-header {
      background: #ffe01b;          /* Mailchimp yellow */
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #chat-header .avatar {
      width: 36px; height: 36px;
      background: #000;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    #chat-header .info h2 {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.2;
    }

    #chat-header .info p {
      font-size: 12px;
      color: #444;
      margin-top: 1px;
    }

    /* ── Messages area ────────────────────────────────────────────────────── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    /* ── Message bubbles ──────────────────────────────────────────────────── */
    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .message-row.user  { justify-content: flex-end; }
    .message-row.bot   { justify-content: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    .message-row.user .bubble {
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message-row.bot .bubble {
      background: #f0f0f0;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    /* Bold inside bot bubble */
    .message-row.bot .bubble strong { color: #111; }

    /* ── Source chips ─────────────────────────────────────────────────────── */
    .sources {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .source-chip {
      background: #fff8d6;
      border: 1px solid #f5d600;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .source-chip .chip-icon { font-size: 10px; }

    /* ── Typing indicator ─────────────────────────────────────────────────── */
    #typing-indicator { display: none; }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: #f0f0f0;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Divider / empty state ────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      color: #999;
      font-size: 13px;
      margin: auto;
      padding: 20px;
    }

    .empty-state .emoji { font-size: 32px; display: block; margin-bottom: 10px; }

    /* ── Input area ───────────────────────────────────────────────────────── */
    #chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      background: #fff;
    }

    #user-input {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
      transition: border-color .15s;
      font-family: inherit;
    }

    #user-input:focus { border-color: #ffe01b; }
    #user-input::placeholder { color: #bbb; }

    #send-btn {
      width: 42px; height: 42px;
      background: #1a1a1a;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background .15s, transform .1s;
    }

    #send-btn:hover  { background: #333; }
    #send-btn:active { transform: scale(.93); }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }

    #send-btn svg { fill: #fff; width: 18px; height: 18px; }

    /* ── Footer ───────────────────────────────────────────────────────────── */
    #chat-footer {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      padding: 6px 16px 10px;
      flex-shrink: 0;
    }

    /* ── Responsive (when embedded in a narrow sidebar) ──────────────────── */
    @media (max-width: 400px) {
      body { padding: 0; }
      #chat-widget { height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════════
     CONFIGURATION
     Change API_BASE_URL to wherever your server.py is hosted.
     When running locally:   http://localhost:5000
     When hosted:            https://your-server.com
════════════════════════════════════════════════════════════════════════════ -->
<script>
  const API_BASE_URL = "ragchatbotmailchimp-production.up.railway.app";
</script>

<!-- ── Widget markup ──────────────────────────────────────────────────────── -->
<div id="chat-widget">

  <!-- Header -->
  <div id="chat-header">
    <div class="avatar">✦</div>
    <div class="info">
      <h2>Style Guide Assistant</h2>
      <p>Answers from the Mailchimp Content Style Guide</p>
    </div>
  </div>

  <!-- Messages -->
  <div id="chat-messages">
    <div class="empty-state" id="empty-state">
      <span class="emoji">📖</span>
      Ask me anything about Mailchimp's content style guide — voice, tone, grammar, inclusive language, and more.
    </div>
  </div>

  <!-- Typing indicator (inserted into #chat-messages by JS) -->
  <div id="typing-indicator" class="message-row bot">
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Input -->
  <div id="chat-input-area">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Ask about Mailchimp's style guide…"
      aria-label="Your question"
    ></textarea>
    <button id="send-btn" aria-label="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <div id="chat-footer">Powered by Claude · Mailchimp Style Guide</div>
</div>

<!-- ── Chat logic ─────────────────────────────────────────────────────────── -->
<script>
  const messagesEl  = document.getElementById("chat-messages");
  const inputEl     = document.getElementById("user-input");
  const sendBtn     = document.getElementById("send-btn");
  const typingEl    = document.getElementById("typing-indicator");
  const emptyState  = document.getElementById("empty-state");

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
  });

  // Send on Enter (Shift+Enter for newline)
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  // ── Render helpers ────────────────────────────────────────────────────────

  function appendMessage(role, html, sources = []) {
    emptyState && (emptyState.style.display = "none");

    const row    = document.createElement("div");
    row.className = `message-row ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    // Render simple markdown: **bold**, newlines → <br>
    bubble.innerHTML = renderMarkdown(html);

    // Source chips
    if (sources.length) {
      const sourcesDiv = document.createElement("div");
      sourcesDiv.className = "sources";
      sources.forEach(s => {
        const chip = document.createElement("div");
        chip.className = "source-chip";
        chip.innerHTML = `<span class="chip-icon">📄</span>${escapeHtml(s.file)} › ${escapeHtml(s.section)}`;
        sourcesDiv.appendChild(chip);
      });
      bubble.appendChild(sourcesDiv);
    }

    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  function showTyping() {
    messagesEl.appendChild(typingEl);
    typingEl.style.display = "flex";
    scrollToBottom();
  }

  function hideTyping() {
    typingEl.style.display = "none";
    typingEl.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Minimal markdown: **bold** and line breaks
  function renderMarkdown(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\n/g, "<br>");
  }

  function escapeHtml(str) {
    return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── Send flow ─────────────────────────────────────────────────────────────

  async function sendMessage() {
    const question = inputEl.value.trim();
    if (!question) return;

    // Clear input
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    // Show user message
    appendMessage("user", question);

    // Show typing indicator
    showTyping();

    try {
      const res = await fetch(`${API_BASE_URL}/chat`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ question }),
      });

      hideTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        appendMessage("bot", `⚠️ Error: ${err.error || res.statusText}`);
        return;
      }

      const data = await res.json();
      appendMessage("bot", data.answer || "No answer returned.", data.sources || []);

    } catch (err) {
      hideTyping();
      appendMessage(
        "bot",
        `⚠️ Could not reach the server. Make sure server.py is running at **${API_BASE_URL}**.`
      );
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>

</body>
</html>
